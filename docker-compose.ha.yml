      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - READY_MAX_INFLIGHT=${READY_MAX_INFLIGHT:-2}
      - SESSION_BACKEND=${SESSION_BACKEND:-redis}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data_4:/app/uploads

  web5:
