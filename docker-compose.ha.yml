services:
  haproxy:
    image: haproxy:2.9-alpine
    depends_on:
      web1:
        condition: service_started
      web2:
        condition: service_started
      web3:
        condition: service_started
      web4:
        condition: service_started
      web5:
        condition: service_started
    ports:
      - "8081:80"
      - "8404:8404"
    volumes:
      - ./haproxy.ha.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  web1:
    build: .
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - READY_MAX_INFLIGHT=${READY_MAX_INFLIGHT:-2}
      - SESSION_BACKEND=${SESSION_BACKEND:-redis}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data_1:/app/uploads

  web2:
    build: .
    ports:
      - "5002:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - READY_MAX_INFLIGHT=${READY_MAX_INFLIGHT:-2}
      - SESSION_BACKEND=${SESSION_BACKEND:-redis}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data_2:/app/uploads

  web3:
