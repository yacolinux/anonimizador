      - READY_MAX_INFLIGHT=${READY_MAX_INFLIGHT:-2}
      - SESSION_BACKEND=${SESSION_BACKEND:-redis}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data_3:/app/uploads

  web4:
    build: .
    ports:
      - "5004:5000"
