name: Smoke Tests

on:
  # Ejecuta en cada push a cualquier rama.
  push:

  # Ejecuta en cada pull request abierto/actualizado.
  pull_request:

  # Permite lanzar el workflow manualmente desde la UI de GitHub.
  workflow_dispatch:

jobs:
  # Job 0: ejecuta tests unitarios, de seguridad y calidad con pytest.
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Descarga el contenido del repositorio al runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Crea un .env explícito para CI con variables de test.
      - name: Create .env for CI
        run: |
          echo "FLASK_SECRET_KEY=test-secret-key" > .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASS=testpass" >> .env
          echo "MODEL_NAME=opencode/test-model" >> .env
          echo "OPENAI_BASE_URL=https://api.test.com/v1" >> .env
          echo "REDIS_URL=redis://redis:6379/15" >> .env
          echo "SESSION_BACKEND=cookie" >> .env
          echo "UPLOAD_TTL_SECONDS=900" >> .env
          echo "LOCAL_INFERENCE_MAX=3" >> .env
          echo "MAX_UPLOAD_MB=100" >> .env
          echo "OCR_MAX_PAGES=50" >> .env

      # Construye y levanta solo Redis (requerido por conftest.py).
      - name: Start Redis for unit tests
        run: docker compose up -d redis

      # Ejecuta la suite de tests unitarios dentro del contenedor web.
      - name: Run pytest suite
        run: docker compose run --rm -e SESSION_BACKEND=cookie web pytest testing/ -v

      # Publica logs de pytest si el job falla.
      - name: Upload pytest logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: |
            testing/logs/
            *.log
          if-no-files-found: ignore

  # Job 1: valida el modo single-instance (docker-compose.yml).
  smoke-single:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      # Descarga el contenido del repositorio al runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Asegura que los scripts de testing sean ejecutables.
      - name: Set execute permissions for test scripts
        run: chmod +x testing/*.sh

      # Crea un .env explícito para CI con variables de test.
      - name: Create .env for CI
        run: |
          echo "FLASK_SECRET_KEY=test-secret-key" > .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASS=testpass" >> .env
          echo "MODEL_NAME=opencode/test-model" >> .env
          echo "OPENAI_BASE_URL=https://api.test.com/v1" >> .env
          echo "REDIS_URL=redis://redis:6379/15" >> .env
          echo "SESSION_BACKEND=cookie" >> .env
          echo "UPLOAD_TTL_SECONDS=900" >> .env
          echo "LOCAL_INFERENCE_MAX=3" >> .env
          echo "MAX_UPLOAD_MB=100" >> .env
          echo "OCR_MAX_PAGES=50" >> .env

      # Ejecuta el smoke test single.
      - name: Run single-instance smoke test
        run: ./testing/smoke_single.sh

      # Publica logs incluso si el test falla, para facilitar debugging.
      - name: Upload single smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-single-logs
          path: testing/logs/smoke-single-*.log
          if-no-files-found: warn

  # Job 2: valida el modo HA (docker-compose.ha.yml + HAProxy).
  smoke-ha:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # Descarga el contenido del repositorio al runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Asegura que los scripts de testing sean ejecutables.
      - name: Set execute permissions for test scripts
        run: chmod +x testing/*.sh

      # Crea un .env explícito para CI con variables de test.
      - name: Create .env for CI
        run: |
          echo "FLASK_SECRET_KEY=test-secret-key" > .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASS=testpass" >> .env
          echo "MODEL_NAME=opencode/test-model" >> .env
          echo "OPENAI_BASE_URL=https://api.test.com/v1" >> .env
          echo "REDIS_URL=redis://redis:6379/15" >> .env
          echo "SESSION_BACKEND=cookie" >> .env
          echo "UPLOAD_TTL_SECONDS=900" >> .env
          echo "LOCAL_INFERENCE_MAX=3" >> .env
          echo "MAX_UPLOAD_MB=100" >> .env
          echo "OCR_MAX_PAGES=50" >> .env

      # Ejecuta el smoke test HA.
      - name: Run HA smoke test
        run: ./testing/smoke_ha.sh

      # Publica logs incluso si el test falla, para facilitar debugging.
      - name: Upload HA smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-ha-logs
          path: testing/logs/smoke-ha-*.log
          if-no-files-found: warn

  # Job 4 (opcional de lectura): resumen textual al final.
  # Este job depende de todos; se ejecuta aunque fallen para dejar traza clara.
  summary:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - smoke-single
      - smoke-ha
    if: always()

    steps:
      - name: Print workflow summary
        run: |
          echo "Smoke tests workflow finished."
          echo "Check individual jobs and artifacts for details."
