name: Unit & Security Tests

on:
  push:

  pull_request:

  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          echo "FLASK_SECRET_KEY=test-secret-key" > .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASS=testpass" >> .env
          echo "MODEL_NAME=opencode/test-model" >> .env
          echo "OPENAI_BASE_URL=https://api.test.com/v1" >> .env
          echo "REDIS_URL=redis://redis:6379/15" >> .env
          echo "SESSION_BACKEND=cookie" >> .env
          echo "UPLOAD_TTL_SECONDS=900" >> .env
          echo "LOCAL_INFERENCE_MAX=3" >> .env
          echo "MAX_UPLOAD_MB=100" >> .env
          echo "OCR_MAX_PAGES=50" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker compose build web

      - name: Run unit tests
        run: >
          docker compose run --rm
          -e SESSION_BACKEND=cookie
          -e REDIS_PORT=16379
          web
          pytest testing/ -v --tb=short
          --ignore=testing/smoke_single.sh
          --ignore=testing/smoke_ha.sh
          --ignore=testing/run_all.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: testing/
          if-no-files-found: warn

  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          echo "FLASK_SECRET_KEY=test-secret-key" > .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASS=testpass" >> .env
          echo "MODEL_NAME=opencode/test-model" >> .env
          echo "OPENAI_BASE_URL=https://api.test.com/v1" >> .env
          echo "REDIS_URL=redis://redis:6379/15" >> .env
          echo "SESSION_BACKEND=cookie" >> .env
          echo "UPLOAD_TTL_SECONDS=900" >> .env
          echo "LOCAL_INFERENCE_MAX=3" >> .env
          echo "MAX_UPLOAD_MB=100" >> .env
          echo "OCR_MAX_PAGES=50" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker compose build web

      - name: Run security tests
        run: >
          docker compose run --rm
          -e SESSION_BACKEND=cookie
          -e REDIS_PORT=16379
          web
          pytest testing/test_security.py -v --tb=short

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: testing/
          if-no-files-found: warn

  quality-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          echo "FLASK_SECRET_KEY=test-secret-key" > .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASS=testpass" >> .env
          echo "MODEL_NAME=opencode/test-model" >> .env
          echo "OPENAI_BASE_URL=https://api.test.com/v1" >> .env
          echo "REDIS_URL=redis://redis:6379/15" >> .env
          echo "SESSION_BACKEND=cookie" >> .env
          echo "UPLOAD_TTL_SECONDS=900" >> .env
          echo "LOCAL_INFERENCE_MAX=3" >> .env
          echo "MAX_UPLOAD_MB=100" >> .env
          echo "OCR_MAX_PAGES=50" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker compose build web

      - name: Run quality tests
        run: >
          docker compose run --rm
          -e SESSION_BACKEND=cookie
          -e REDIS_PORT=16379
          web
          pytest testing/test_anonymization_quality.py -v --tb=short

      - name: Upload quality test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-test-results
          path: testing/
          if-no-files-found: warn

  summary:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - security-tests
      - quality-tests
    if: always()

    steps:
      - name: Print workflow summary
        run: |
          echo "Unit & Security tests workflow finished."
          echo "Check individual jobs and artifacts for details."
