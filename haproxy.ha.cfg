global
    log stdout format raw local0
    maxconn 4000

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option redispatch
    retries 2
    timeout connect 5s
    timeout client 120s
    timeout server 120s
    timeout http-request 15s
    timeout queue 20s

frontend fe_anonimizador
    bind *:80
    acl is_admin path_beg /admin
    use_backend be_anonimizador_admin if is_admin
    default_backend be_anonimizador

backend be_anonimizador
    balance leastconn
    option httpchk GET /ready
    http-check expect status 200
    stick-table type ip size 100k expire 30m
    stick on src

    server a1 web1:5000 check inter 2s fall 2 rise 2 maxconn 25
    server a2 web2:5000 check inter 2s fall 2 rise 2 maxconn 25
    server a3 web3:5000 check inter 2s fall 2 rise 2 maxconn 25
    server a4 web4:5000 check inter 2s fall 2 rise 2 maxconn 25
    server a5 web5:5000 check inter 2s fall 2 rise 2 maxconn 25

backend be_anonimizador_admin
    balance roundrobin
    cookie SRV insert indirect nocache
    option httpchk GET /ready
    http-check expect status 200

    server a1 web1:5000 check cookie a1
    server a2 web2:5000 check cookie a2
    server a3 web3:5000 check cookie a3
    server a4 web4:5000 check cookie a4
    server a5 web5:5000 check cookie a5

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
